services:
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: app
    restart: unless-stopped
    env_file:
      - ./.env
    volumes:
      - ./app:/app
    networks:
      - app-network
    depends_on:
      database:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/observability/healthcheck')"]
      #test: ["CMD", "curl", "-f", "http://localhost:8080/observability/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
  ml-worker:
    build:
      context: ./ml-worker
      dockerfile: Dockerfile
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - API_URL=${API_URL}
      - RABBITMQ_URL=amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672/
    container_name: ml-worker
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./ml-worker:/ml-worker
    networks:
      - app-network
    depends_on:
      rabbitmq:
        condition: service_healthy
  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: ui
    restart: unless-stopped
    environment:
      - API_URL=http://app:8080
      - STREAMLIT_SERVER_FILE_WATCHER_TYPE=poll
    volumes:
      - ./ui:/ui
    ports:
      - "8501:8501"
    depends_on:
      app:
        condition: service_healthy
    networks:
      - app-network
  web:
    image: nginx:1.29.4-alpine3.23-perl
    container_name: app-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    networks:
      - app-network
  rabbitmq:
    image: rabbitmq:4.2.3-management-alpine
    container_name: app-rabbitmq
    restart: unless-stopped
    #restart: on-failure:5
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "15672:15672"
      - "5672:5672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - app-network
  database:
    image: postgres:alpine3.23
    container_name: app-postgres
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    env_file:
      - ./pgadmin/.env
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - app-network
    ports:
      - "5080:80"
    depends_on:
      - database

volumes:
  postgres-data:
  pgadmin-data:
  rabbitmq-data:


networks:
  app-network:
    name: app-network
    driver: bridge